<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#080808">
  <title>CortaJá — Painel</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <style>
    /* ── Tabs ──────────────────────────────────────── */
    .tab-bar { display:flex; gap:6px; padding:16px 20px 0; overflow-x:auto; scrollbar-width:none; }
    .tab-bar::-webkit-scrollbar { display:none; }
    .tab { padding:10px 18px; border-radius:99px; border:1.5px solid rgba(255,255,255,0.08); background:var(--bg2); color:var(--text2); font-size:0.82rem; font-weight:500; cursor:pointer; white-space:nowrap; transition:all var(--transition); font-family:var(--font-body); }
    .tab.active { background:var(--gold-dim); border-color:var(--gold); color:var(--gold); }

    /* ── Cards de profissional / serviço ──────────── */
    .prof-card { display:flex; align-items:center; gap:14px; }
    .prof-info { flex:1; }
    .prof-nome { font-weight:600; font-size:0.95rem; }
    .prof-esp { font-size:0.8rem; color:var(--text2); margin-top:2px; }
    .serv-card { display:flex; align-items:center; justify-content:space-between; }
    .serv-info { flex:1; }
    .serv-nome { font-weight:600; font-size:0.95rem; }
    .serv-dur { font-size:0.78rem; color:var(--text2); margin-top:2px; }
    .serv-preco { font-family:var(--font-title); font-weight:700; color:var(--gold); font-size:1rem; }

    /* ── Cards de agendamento ─────────────────────── */
    .ag-card { display:flex; flex-direction:column; gap:8px; }
    .ag-header { display:flex; align-items:center; justify-content:space-between; }
    .ag-hora { font-family:var(--font-title); font-size:1.2rem; font-weight:700; }
    .ag-cliente { font-size:0.9rem; color:var(--text2); }
    .ag-servico { font-size:0.8rem; color:var(--text3); margin-top:2px; }
    .ag-actions { display:flex; gap:8px; margin-top:4px; }

    /* ── Skeleton loader ──────────────────────────── */
    .skeleton { background: linear-gradient(90deg, var(--bg3) 25%, var(--bg4) 50%, var(--bg3) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: var(--radius-sm); }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .sk-card { height:90px; margin-bottom:10px; border-radius:var(--radius-md); }
    .sk-card-tall { height:120px; margin-bottom:10px; border-radius:var(--radius-md); }

    /* ── Resumo do dia ────────────────────────────── */
    .resumo-dia { display:flex; gap:10px; margin-bottom:16px; }
    .resumo-stat { flex:1; background:var(--bg2); border-radius:var(--radius-md); padding:12px; text-align:center; border:1px solid rgba(255,255,255,0.05); }
    .resumo-stat-val { font-family:var(--font-title); font-size:1.4rem; font-weight:700; color:var(--gold); }
    .resumo-stat-lbl { font-size:0.72rem; color:var(--text2); margin-top:2px; }
  </style>
</head>
<body>
  <!-- Loading overlay leve — só bloqueia na init, não em cada req -->
  <div id="loading-overlay" style="display:none;"><div class="spinner"></div></div>

  <div class="page">
    <header class="header">
      <div class="header-inner">
        <div class="logo">Corta<span>Já</span></div>
        <div id="salao-nome" style="font-size:0.82rem;color:var(--text2);">Carregando...</div>
      </div>
    </header>

    <!-- Tabs -->
    <div class="tab-bar">
      <button class="tab active" data-tab="agenda">📅 Agenda</button>
      <button class="tab" data-tab="cabeleireiros">✂️ Profissionais</button>
      <button class="tab" data-tab="servicos">💈 Serviços</button>
      <button class="tab" data-tab="produtos">🧴 Produtos</button>
      <button class="tab" data-tab="config">⚙️ Config</button>
    </div>

    <!-- ── AGENDA ──────────────────────────────────────── -->
    <div id="tab-agenda" class="section">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
        <input type="date" class="input" id="data-agenda" style="flex:1;">
        <button class="btn btn-ghost btn-sm" id="btn-atualizar" title="Atualizar">🔄</button>
      </div>

      <!-- Resumo rápido do dia -->
      <div class="resumo-dia" id="resumo-dia" style="display:none;">
        <div class="resumo-stat">
          <div class="resumo-stat-val" id="rstat-total">0</div>
          <div class="resumo-stat-lbl">Total</div>
        </div>
        <div class="resumo-stat">
          <div class="resumo-stat-val" id="rstat-confirmados" style="color:var(--green);">0</div>
          <div class="resumo-stat-lbl">Confirmados</div>
        </div>
        <div class="resumo-stat">
          <div class="resumo-stat-val" id="rstat-aguardando" style="color:var(--gold);">0</div>
          <div class="resumo-stat-lbl">Aguard. Pix</div>
        </div>
      </div>

      <div class="stack" id="lista-agendamentos">
        <div class="skeleton sk-card-tall"></div>
        <div class="skeleton sk-card-tall"></div>
        <div class="skeleton sk-card"></div>
      </div>
    </div>

    <!-- ── PROFISSIONAIS ───────────────────────────────── -->
    <div id="tab-cabeleireiros" class="section" style="display:none;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div class="section-title" style="margin:0">Profissionais</div>
        <button class="btn btn-primary btn-sm" id="btn-novo-prof">+ Novo</button>
      </div>
      <div class="stack" id="lista-prof">
        <div class="skeleton sk-card"></div>
        <div class="skeleton sk-card"></div>
      </div>
    </div>

    <!-- ── SERVIÇOS ────────────────────────────────────── -->
    <div id="tab-servicos" class="section" style="display:none;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div class="section-title" style="margin:0">Serviços</div>
        <button class="btn btn-primary btn-sm" id="btn-novo-serv">+ Novo</button>
      </div>
      <div class="stack" id="lista-serv">
        <div class="skeleton sk-card"></div>
        <div class="skeleton sk-card"></div>
      </div>
    </div>

    <!-- ── PRODUTOS ────────────────────────────────────── -->
    <div id="tab-produtos" class="section" style="display:none;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div class="section-title" style="margin:0">Produtos</div>
        <button class="btn btn-primary btn-sm" id="btn-novo-prod">+ Novo</button>
      </div>
      <div class="stack" id="lista-prod">
        <div class="skeleton sk-card"></div>
        <div class="skeleton sk-card"></div>
      </div>
    </div>

    <!-- ── CONFIG ──────────────────────────────────────── -->
    <div id="tab-config" class="section" style="display:none;">
      <div class="section-title">Configurações do Salão</div>
      <div class="stack">
        <div class="card">
          <p style="font-size:0.85rem;color:var(--text2);margin-bottom:12px;">Link de agendamento para compartilhar com clientes:</p>
          <div class="link-box" id="link-booking-box" style="background:var(--bg3);border-radius:var(--radius-sm);padding:12px;display:flex;align-items:center;gap:10px;cursor:pointer;">
            <div id="link-booking-url" style="font-size:0.82rem;color:var(--gold);flex:1;word-break:break-all;"></div>
            <button onclick="copiarLink()" style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:1rem;">📋</button>
          </div>
          <button class="btn btn-outline btn-full" style="margin-top:12px;" onclick="compartilharLink()">Compartilhar Link</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Modal: Novo Profissional ───────────────────────── -->
  <div class="modal-overlay" id="modal-prof">
    <div class="modal">
      <div class="modal-handle"></div>
      <h3 class="modal-title">Novo Profissional</h3>
      <div class="stack">
        <div class="input-group">
          <label class="input-label">Nome *</label>
          <input class="input" id="fp-nome" placeholder="Nome do profissional" type="text">
        </div>
        <div class="input-group">
          <label class="input-label">Especialidades</label>
          <input class="input" id="fp-esp" placeholder="Ex: Degradê, Barba, Navalhado" type="text">
        </div>
        <div class="input-group">
          <label class="input-label">Foto (URL da imagem)</label>
          <input class="input" id="fp-foto" placeholder="https://..." type="url">
        </div>
        <div style="display:flex;gap:10px;margin-top:8px;">
          <button class="btn btn-ghost btn-full" onclick="fecharModal('modal-prof')">Cancelar</button>
          <button class="btn btn-primary btn-full" id="btn-salvar-prof">Salvar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Modal: Novo Serviço ────────────────────────────── -->
  <div class="modal-overlay" id="modal-serv">
    <div class="modal">
      <div class="modal-handle"></div>
      <h3 class="modal-title">Novo Serviço</h3>
      <div class="stack">
        <div class="input-group">
          <label class="input-label">Nome do Serviço *</label>
          <input class="input" id="fs-nome" placeholder="Ex: Corte Degradê" type="text">
        </div>
        <div class="grid-2">
          <div class="input-group">
            <label class="input-label">Preço (R$)</label>
            <input class="input" id="fs-preco" placeholder="0,00" type="number" step="0.01" min="0">
          </div>
          <div class="input-group">
            <label class="input-label">Duração (min)</label>
            <input class="input" id="fs-dur" placeholder="30" type="number" min="15" step="15">
          </div>
        </div>
        <div style="display:flex;gap:10px;margin-top:8px;">
          <button class="btn btn-ghost btn-full" onclick="fecharModal('modal-serv')">Cancelar</button>
          <button class="btn btn-primary btn-full" id="btn-salvar-serv">Salvar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Modal: Novo Produto ────────────────────────────── -->
  <div class="modal-overlay" id="modal-prod">
    <div class="modal">
      <div class="modal-handle"></div>
      <h3 class="modal-title">Novo Produto</h3>
      <div class="stack">
        <div class="input-group">
          <label class="input-label">Nome *</label>
          <input class="input" id="fpd-nome" placeholder="Ex: Pomada Modeladora" type="text">
        </div>
        <div class="input-group">
          <label class="input-label">Descrição</label>
          <input class="input" id="fpd-desc" placeholder="Breve descrição" type="text">
        </div>
        <div class="input-group">
          <label class="input-label">Preço (R$)</label>
          <input class="input" id="fpd-preco" placeholder="0,00" type="number" step="0.01" min="0">
        </div>
        <div class="input-group">
          <label class="input-label">Foto (URL)</label>
          <input class="input" id="fpd-foto" placeholder="https://..." type="url">
        </div>
        <div style="display:flex;gap:10px;margin-top:8px;">
          <button class="btn btn-ghost btn-full" onclick="fecharModal('modal-prod')">Cancelar</button>
          <button class="btn btn-primary btn-full" id="btn-salvar-prod">Salvar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js');

    const params = new URLSearchParams(location.search);
    const SALON_ID = params.get('id');

    if (!SALON_ID) {
      document.body.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:24px;text-align:center;"><h2 style="color:var(--gold)">Link inválido</h2><p style="margin-top:8px;">Este link não possui um ID de salão válido.</p></div>';
    }

    // ── Cache local para evitar chamadas repetidas ─────────────
    const cache = { prof: null, serv: null, prod: null };

    // ── TABS ────────────────────────────────────────────────────
    document.querySelectorAll('.tab').forEach(tab => {
      tab.onclick = () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll('[id^="tab-"]').forEach(s => s.style.display = 'none');
        document.getElementById('tab-' + tab.dataset.tab).style.display = '';
        if (tab.dataset.tab === 'cabeleireiros') carregarProf();
        if (tab.dataset.tab === 'servicos') carregarServ();
        if (tab.dataset.tab === 'produtos') carregarProd();
        if (tab.dataset.tab === 'agenda') carregarAgenda();
      };
    });

    // ── FECHAR MODAIS ───────────────────────────────────────────
    function fecharModal(id) { document.getElementById(id).classList.remove('open'); }
    document.querySelectorAll('.modal-overlay').forEach(m => {
      m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
    });

    // ── SKELETON helpers ─────────────────────────────────────────
    function skeletons(containerId, tall = false) {
      const cls = tall ? 'sk-card-tall' : 'sk-card';
      document.getElementById(containerId).innerHTML =
        `<div class="skeleton ${cls}"></div><div class="skeleton ${cls}"></div><div class="skeleton ${cls}"></div>`;
    }

    // ── INIT ─────────────────────────────────────────────────────
    // Carrega info do salão e agenda em paralelo para ser rápido
    async function init() {
      mostrarLoading(true);

      // Dispara as duas chamadas ao mesmo tempo
      const [info] = await Promise.all([
        api({ action: 'getEstabelecimento', id: SALON_ID }),
      ]);

      mostrarLoading(false);

      if (info.erro) { mostrarToast(info.erro, 'erro'); return; }

      document.getElementById('salao-nome').textContent = info.nome;
      document.title = 'CortaJá — ' + info.nome;

      const linkUrl = CONFIG.BASE_URL + '/booking.html?id=' + SALON_ID;
      const el = document.getElementById('link-booking-url');
      if (el) el.textContent = linkUrl;

      // Data padrão hoje e carrega agenda sem bloquear a tela
      document.getElementById('data-agenda').value = dataHoje();
      carregarAgenda();
    }

    function copiarLink() {
      const url = CONFIG.BASE_URL + '/booking.html?id=' + SALON_ID;
      navigator.clipboard.writeText(url).then(() => mostrarToast('Link copiado!', 'sucesso'));
    }

    function compartilharLink() {
      const url = CONFIG.BASE_URL + '/booking.html?id=' + SALON_ID;
      if (navigator.share) {
        navigator.share({ title: 'Agende seu corte!', url });
      } else {
        copiarLink();
      }
    }

    // ── AGENDA ───────────────────────────────────────────────────
    document.getElementById('data-agenda').onchange = carregarAgenda;
    document.getElementById('btn-atualizar').onclick = carregarAgenda;

    // Auto-atualiza a cada 60 segundos quando a aba agenda está visível
    setInterval(() => {
      const agendaTab = document.getElementById('tab-agenda');
      if (agendaTab && agendaTab.style.display !== 'none') carregarAgenda(true);
    }, 60000);

    async function carregarAgenda(silencioso = false) {
      const data = document.getElementById('data-agenda').value;
      if (!data) return;

      if (!silencioso) skeletons('lista-agendamentos', true);

      // ── BUG CORRIGIDO: Normaliza a data para comparação ────────
      // O Sheets pode retornar a.data como objeto Date ou string no
      // formato "YYYY-MM-DD". Normalizamos tudo para string YYYY-MM-DD.
      const lista = await api({ action: 'listarAgendamentosResponsavel', id_estabelecimento: SALON_ID });

      const filtrados = Array.isArray(lista)
        ? lista.filter(a => normalizarData(a.data) === data)
        : [];

      const container = document.getElementById('lista-agendamentos');
      const resumo = document.getElementById('resumo-dia');

      if (!filtrados.length) {
        resumo.style.display = 'none';
        container.innerHTML = '<div class="empty"><div class="empty-icon">📅</div><p>Sem agendamentos nesta data</p></div>';
        return;
      }

      // Ordena por horário
      filtrados.sort((a, b) => {
        const ha = normalizarHorario(a.horario);
        const hb = normalizarHorario(b.horario);
        return ha > hb ? 1 : -1;
      });

      // Atualiza resumo rápido
      const total       = filtrados.filter(a => a.status !== 'expirado' && a.status !== 'cancelado').length;
      const confirmados = filtrados.filter(a => a.status === 'confirmado').length;
      const aguardando  = filtrados.filter(a => a.status === 'selecionando').length;
      document.getElementById('rstat-total').textContent       = total;
      document.getElementById('rstat-confirmados').textContent = confirmados;
      document.getElementById('rstat-aguardando').textContent  = aguardando;
      resumo.style.display = 'flex';

      const statusLabel = {
        confirmado:   ['badge-green', 'Confirmado'],
        selecionando: ['badge-gold',  'Aguardando Pix'],
        cancelado:    ['badge-red',   'Cancelado'],
        expirado:     ['badge-grey',  'Expirado']
      };

      container.innerHTML = filtrados.map(ag => {
        const [cls, lbl] = statusLabel[ag.status] || ['badge-grey', ag.status];
        const horario = normalizarHorario(ag.horario);

        // Busca nomes de profissional e serviço no cache
        const profNome = buscaNomeCache('prof', ag.id_cabeleireiro);
        const servNome = buscaNomeCache('serv', ag.id_servico);

        return `
          <div class="card ag-card fade-in">
            <div class="ag-header">
              <div class="ag-hora">${horario}</div>
              <span class="badge ${cls}">${lbl}</span>
            </div>
            <div class="ag-cliente">👤 ${ag.nome_cliente || '–'}</div>
            <div class="ag-cliente">📱 ${ag.telefone_cliente || '–'}</div>
            ${profNome ? `<div class="ag-servico">✂️ ${profNome}</div>` : ''}
            ${servNome ? `<div class="ag-servico">💈 ${servNome}</div>` : ''}
            <div class="ag-actions">
              ${ag.status === 'selecionando' ? `
                <button class="btn btn-primary btn-sm" onclick="confirmarPag('${ag.id}')">✓ Confirmar Pagamento</button>
              ` : ''}
              ${ag.status === 'confirmado' ? `
                <button class="btn btn-danger btn-sm" onclick="cancelarAg('${ag.id}')">✕ Cancelar</button>
              ` : ''}
            </div>
          </div>`;
      }).join('');
    }

    // Normaliza campo data que pode vir como Date do Sheets ou string
    function normalizarData(valor) {
      if (!valor) return '';
      if (valor instanceof Date) {
        return valor.getFullYear() + '-' +
          String(valor.getMonth() + 1).padStart(2, '0') + '-' +
          String(valor.getDate()).padStart(2, '0');
      }
      // String pode vir como "2026-05-15T00:00:00Z" ou "2026-05-15"
      return String(valor).substring(0, 10);
    }

    // Normaliza campo horário que pode vir como Date do Sheets ou string
    function normalizarHorario(valor) {
      if (!valor && valor !== 0) return '--:--';
      if (typeof valor === 'string' && valor.indexOf(':') !== -1) return valor.substring(0, 5);
      if (valor instanceof Date) {
        return String(valor.getHours()).padStart(2, '0') + ':' + String(valor.getMinutes()).padStart(2, '0');
      }
      if (typeof valor === 'number') {
        const min = Math.round(valor * 24 * 60);
        return String(Math.floor(min / 60)).padStart(2, '0') + ':' + String(min % 60).padStart(2, '0');
      }
      return String(valor).substring(0, 5);
    }

    // Busca nome de profissional/serviço no cache local
    function buscaNomeCache(tipo, id) {
      if (!id) return '';
      if (tipo === 'prof' && cache.prof) {
        const p = cache.prof.find(x => x.id === id);
        return p ? p.nome : '';
      }
      if (tipo === 'serv' && cache.serv) {
        const s = cache.serv.find(x => x.id === id);
        return s ? s.nome_servico : '';
      }
      return '';
    }

    async function confirmarPag(id) {
      mostrarLoading(true);
      const r = await api({ action: 'confirmarPagamento', id });
      mostrarLoading(false);
      if (r.sucesso) { mostrarToast('Agendamento confirmado!', 'sucesso'); carregarAgenda(); }
      else mostrarToast(r.erro || 'Erro', 'erro');
    }

    async function cancelarAg(id) {
      if (!confirm('Cancelar este agendamento?')) return;
      mostrarLoading(true);
      await api({ action: 'cancelarAgendamento', id });
      mostrarLoading(false);
      mostrarToast('Agendamento cancelado', 'sucesso');
      carregarAgenda();
    }

    // ── PROFISSIONAIS ─────────────────────────────────────────────
    async function carregarProf(forcar = false) {
      if (cache.prof && !forcar) { renderProf(cache.prof); return; }
      skeletons('lista-prof');
      const lista = await api({ action: 'listarCabeleireiros', id_estabelecimento: SALON_ID });
      cache.prof = Array.isArray(lista) ? lista : [];
      renderProf(cache.prof);
    }

    function renderProf(lista) {
      const container = document.getElementById('lista-prof');
      if (!lista.length) {
        container.innerHTML = '<div class="empty"><div class="empty-icon">✂️</div><p>Nenhum profissional cadastrado</p></div>'; return;
      }
      container.innerHTML = lista.map(p => `
        <div class="card fade-in">
          <div class="prof-card">
            <div style="width:48px;height:48px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:1.3rem;overflow:hidden;flex-shrink:0;">
              ${p.foto_url ? `<img src="${p.foto_url}" style="width:100%;height:100%;object-fit:cover;">` : '✂️'}
            </div>
            <div class="prof-info">
              <div class="prof-nome">${p.nome}</div>
              <div class="prof-esp">${p.especialidades || 'Sem especialidades'}</div>
            </div>
            <button class="btn btn-danger btn-sm btn-icon" onclick="deletarProf('${p.id}')">✕</button>
          </div>
        </div>
      `).join('');
    }

    document.getElementById('btn-novo-prof').onclick = () => document.getElementById('modal-prof').classList.add('open');
    document.getElementById('btn-salvar-prof').onclick = async () => {
      const nome = document.getElementById('fp-nome').value.trim();
      if (!nome) { mostrarToast('Informe o nome', 'erro'); return; }
      mostrarLoading(true);
      const r = await api({ action: 'salvarCabeleireiro', id_estabelecimento: SALON_ID, nome,
        especialidades: document.getElementById('fp-esp').value.trim(),
        foto_url: document.getElementById('fp-foto').value.trim() });
      mostrarLoading(false);
      if (r.sucesso) {
        mostrarToast('Profissional cadastrado!', 'sucesso');
        fecharModal('modal-prof');
        cache.prof = null; // invalida cache
        carregarProf(true);
        ['fp-nome','fp-esp','fp-foto'].forEach(id => document.getElementById(id).value = '');
      } else mostrarToast(r.erro || 'Erro', 'erro');
    };

    async function deletarProf(id) {
      if (!confirm('Excluir profissional?')) return;
      await api({ action: 'deletarCabeleireiro', id });
      cache.prof = null;
      mostrarToast('Removido', 'sucesso');
      carregarProf(true);
    }

    // ── SERVIÇOS ──────────────────────────────────────────────────
    async function carregarServ(forcar = false) {
      if (cache.serv && !forcar) { renderServ(cache.serv); return; }
      skeletons('lista-serv');
      const lista = await api({ action: 'listarServicos', id_estabelecimento: SALON_ID });
      cache.serv = Array.isArray(lista) ? lista : [];
      renderServ(cache.serv);
    }

    function renderServ(lista) {
      const container = document.getElementById('lista-serv');
      if (!lista.length) {
        container.innerHTML = '<div class="empty"><div class="empty-icon">💈</div><p>Nenhum serviço cadastrado</p></div>'; return;
      }
      container.innerHTML = lista.map(s => `
        <div class="card fade-in">
          <div class="serv-card">
            <div class="serv-info">
              <div class="serv-nome">${s.nome_servico}</div>
              <div class="serv-dur">${s.duracao_minutos} minutos</div>
            </div>
            <div style="display:flex;align-items:center;gap:10px;">
              <div class="serv-preco">${formatarMoeda(s.preco)}</div>
              <button class="btn btn-danger btn-sm btn-icon" onclick="deletarServ('${s.id}')">✕</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    document.getElementById('btn-novo-serv').onclick = () => document.getElementById('modal-serv').classList.add('open');
    document.getElementById('btn-salvar-serv').onclick = async () => {
      const nome = document.getElementById('fs-nome').value.trim();
      if (!nome) { mostrarToast('Informe o nome', 'erro'); return; }
      mostrarLoading(true);
      const r = await api({ action: 'salvarServico', id_estabelecimento: SALON_ID, nome_servico: nome,
        preco: document.getElementById('fs-preco').value,
        duracao_minutos: document.getElementById('fs-dur').value || 30 });
      mostrarLoading(false);
      if (r.sucesso) {
        mostrarToast('Serviço cadastrado!', 'sucesso');
        fecharModal('modal-serv');
        cache.serv = null;
        carregarServ(true);
        ['fs-nome','fs-preco','fs-dur'].forEach(id => document.getElementById(id).value = '');
      } else mostrarToast(r.erro || 'Erro', 'erro');
    };

    async function deletarServ(id) {
      if (!confirm('Excluir serviço?')) return;
      await api({ action: 'deletarServico', id });
      cache.serv = null;
      mostrarToast('Removido', 'sucesso');
      carregarServ(true);
    }

    // ── PRODUTOS ──────────────────────────────────────────────────
    async function carregarProd(forcar = false) {
      if (cache.prod && !forcar) { renderProd(cache.prod); return; }
      skeletons('lista-prod');
      const lista = await api({ action: 'listarProdutos', id_estabelecimento: SALON_ID });
      cache.prod = Array.isArray(lista) ? lista : [];
      renderProd(cache.prod);
    }

    function renderProd(lista) {
      const container = document.getElementById('lista-prod');
      if (!lista.length) {
        container.innerHTML = '<div class="empty"><div class="empty-icon">🧴</div><p>Nenhum produto cadastrado</p></div>'; return;
      }
      container.innerHTML = lista.map(p => `
        <div class="card fade-in">
          <div style="display:flex;align-items:center;gap:12px;">
            <div style="width:48px;height:48px;border-radius:14px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:1.3rem;overflow:hidden;flex-shrink:0;">
              ${p.foto_url ? `<img src="${p.foto_url}" style="width:100%;height:100%;object-fit:cover;">` : '🧴'}
            </div>
            <div style="flex:1;">
              <div style="font-weight:600;font-size:0.95rem;">${p.nome}</div>
              <div style="font-size:0.78rem;color:var(--text2);">${p.descricao || ''}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
              <div style="font-family:var(--font-title);font-weight:700;color:var(--gold);">${formatarMoeda(p.preco)}</div>
              <button class="btn btn-danger btn-sm btn-icon" onclick="deletarProd('${p.id}')">✕</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    document.getElementById('btn-novo-prod').onclick = () => document.getElementById('modal-prod').classList.add('open');
    document.getElementById('btn-salvar-prod').onclick = async () => {
      const nome = document.getElementById('fpd-nome').value.trim();
      if (!nome) { mostrarToast('Informe o nome', 'erro'); return; }
      mostrarLoading(true);
      const r = await api({ action: 'salvarProduto', id_estabelecimento: SALON_ID, nome,
        descricao: document.getElementById('fpd-desc').value.trim(),
        preco: document.getElementById('fpd-preco').value,
        foto_url: document.getElementById('fpd-foto').value.trim() });
      mostrarLoading(false);
      if (r.sucesso) {
        mostrarToast('Produto cadastrado!', 'sucesso');
        fecharModal('modal-prod');
        cache.prod = null;
        carregarProd(true);
        ['fpd-nome','fpd-desc','fpd-preco','fpd-foto'].forEach(id => document.getElementById(id).value = '');
      } else mostrarToast(r.erro || 'Erro', 'erro');
    };

    async function deletarProd(id) {
      if (!confirm('Excluir produto?')) return;
      await api({ action: 'deletarProduto', id });
      cache.prod = null;
      mostrarToast('Removido', 'sucesso');
      carregarProd(true);
    }

    init();
  </script>
</body>
</html>
