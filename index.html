<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#080808">
  <title>CortaJá — Admin</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <style>
    .est-card { display:flex; gap:14px; align-items:flex-start; }
    .est-info { flex:1; min-width:0; }
    .est-nome { font-family:var(--font-title); font-weight:700; font-size:1.05rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .est-resp { font-size:0.82rem; color:var(--text2); margin-top:3px; }

    /* Detalhes extras do estabelecimento */
    .est-details { margin-top:12px; display:flex; flex-direction:column; gap:5px; }
    .est-detail-row { display:flex; align-items:center; gap:8px; font-size:0.8rem; color:var(--text2); }
    .est-detail-row span.icon { font-size:0.9rem; flex-shrink:0; width:18px; text-align:center; }
    .est-detail-row strong { color:var(--text); font-weight:500; }

    /* Mini stats do estabelecimento */
    .est-stats { display:flex; gap:8px; margin-top:14px; }
    .est-stat { flex:1; background:var(--bg3); border-radius:var(--radius-sm); padding:10px 8px; text-align:center; border:1px solid rgba(255,255,255,0.05); }
    .est-stat-val { font-family:var(--font-title); font-size:1.1rem; font-weight:700; color:var(--gold); }
    .est-stat-lbl { font-size:0.65rem; color:var(--text3); margin-top:2px; text-transform:uppercase; letter-spacing:0.05em; }

    .est-links { display:flex; flex-direction:column; gap:6px; margin-top:14px; }
    .link-box { background:var(--bg3); border-radius:var(--radius-sm); padding:10px 14px; display:flex; align-items:center; gap:10px; cursor:pointer; border:1px solid rgba(255,255,255,0.06); transition:background var(--transition); }
    .link-box:active { background:var(--bg4); }
    .link-label { font-size:0.68rem; color:var(--text3); text-transform:uppercase; letter-spacing:0.08em; display:block; margin-bottom:2px; }
    .link-url { font-size:0.78rem; color:var(--gold); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; }
    .copy-btn { color:var(--text2); flex-shrink:0; background:none; border:none; cursor:pointer; font-size:0.85rem; }
    .est-actions { display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; }

    /* Accordion de detalhes */
    .est-accordion-toggle { display:flex; align-items:center; justify-content:center; gap:6px; margin-top:12px; background:none; border:none; color:var(--text3); font-size:0.75rem; cursor:pointer; font-family:var(--font-body); width:100%; padding:4px; }
    .est-accordion-body { display:none; }
    .est-accordion-body.open { display:block; }
  </style>
</head>
<body>
  <div id="loading-overlay"><div class="spinner"></div></div>

  <!-- PWA Banner -->
  <div id="pwa-banner">
    <div class="pwa-icon">✂️</div>
    <div class="pwa-text">
      <h4>Instalar CortaJá</h4>
      <p>Acesse mais rápido pela tela inicial</p>
    </div>
    <div class="pwa-actions">
      <button class="btn btn-primary btn-sm" id="pwa-install-btn">Instalar</button>
      <button class="btn btn-ghost btn-sm" id="pwa-dismiss-btn">Depois</button>
    </div>
  </div>

  <div class="page">
    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <div class="logo">Corta<span>Já</span></div>
        <span class="badge badge-gold">Admin</span>
      </div>
    </header>

    <!-- Stats -->
    <div class="section" id="stats-section">
      <div class="grid-2">
        <div class="stat-card fade-in">
          <div class="stat-value" id="stat-total">–</div>
          <div class="stat-label">Salões</div>
        </div>
        <div class="stat-card fade-in" style="animation-delay:.08s">
          <div class="stat-value" id="stat-ativos">–</div>
          <div class="stat-label">Ativos</div>
        </div>
      </div>
    </div>

    <!-- Lista de estabelecimentos -->
    <div class="section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div class="section-title" style="margin:0">Estabelecimentos</div>
        <button class="btn btn-primary btn-sm" id="btn-novo">+ Novo</button>
      </div>
      <div class="stack" id="lista-est">
        <div class="empty"><div class="empty-icon">💈</div><p>Nenhum salão cadastrado ainda</p></div>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-item active">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Início
    </button>
    <button class="nav-item" id="nav-relatorios">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Relatórios
    </button>
    <button class="nav-item" id="nav-config">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06-.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Config
    </button>
  </nav>

  <!-- Modal: Novo Estabelecimento -->
  <div class="modal-overlay" id="modal-novo">
    <div class="modal">
      <div class="modal-handle"></div>
      <h3 class="modal-title">Novo Estabelecimento</h3>
      <div class="stack">
        <div class="input-group">
          <label class="input-label">Nome do Salão *</label>
          <input class="input" id="f-nome" placeholder="Ex: Barbearia Elite" type="text">
        </div>
        <div class="input-group">
          <label class="input-label">Responsável *</label>
          <input class="input" id="f-resp" placeholder="Nome completo" type="text">
        </div>
        <div class="input-group">
          <label class="input-label">Telefone / WhatsApp *</label>
          <input class="input" id="f-tel" placeholder="(61) 99999-9999" type="tel">
        </div>
        <div class="input-group">
          <label class="input-label">E-mail</label>
          <input class="input" id="f-email" placeholder="email@exemplo.com" type="email">
        </div>
        <div class="input-group">
          <label class="input-label">Endereço</label>
          <input class="input" id="f-end" placeholder="Rua, número, bairro" type="text">
        </div>
        <div class="grid-2">
          <div class="input-group">
            <label class="input-label">Abre</label>
            <input class="input" id="f-abre" type="time" value="08:00">
          </div>
          <div class="input-group">
            <label class="input-label">Fecha</label>
            <input class="input" id="f-fecha" type="time" value="18:00">
          </div>
        </div>
        <div class="input-group">
          <label class="input-label">Chave Pix</label>
          <input class="input" id="f-pix" placeholder="Telefone, CPF ou e-mail" type="text">
        </div>
        <div style="display:flex;gap:10px;margin-top:8px;">
          <button class="btn btn-ghost btn-full" id="btn-cancelar-modal">Cancelar</button>
          <button class="btn btn-primary btn-full" id="btn-salvar-est">Salvar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    // ── PWA ────────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }

    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('pwa-banner').classList.add('show');
    });
    document.getElementById('pwa-install-btn').onclick = async () => {
      if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; }
      document.getElementById('pwa-banner').classList.remove('show');
    };
    document.getElementById('pwa-dismiss-btn').onclick = () => {
      document.getElementById('pwa-banner').classList.remove('show');
    };

    // ── CARREGAR LISTA ─────────────────────────────────────
    async function carregarEstabelecimentos() {
      mostrarLoading(true);
      const lista = await api({ action: 'listarEstabelecimentos' });
      mostrarLoading(false);

      const ativos = Array.isArray(lista) ? lista.filter(e => e.status === 'ativo') : [];
      document.getElementById('stat-total').textContent = Array.isArray(lista) ? lista.length : 0;
      document.getElementById('stat-ativos').textContent = ativos.length;

      const container = document.getElementById('lista-est');
      if (!Array.isArray(lista) || lista.length === 0) {
        container.innerHTML = '<div class="empty"><div class="empty-icon">💈</div><p>Nenhum salão cadastrado ainda</p></div>';
        return;
      }

      container.innerHTML = lista.map((e, idx) => {
        const diasSemana = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
        const hoje = new Date();
        const diaAtual = diasSemana[hoje.getDay()];

        const horarioAb = e.horario_abertura || '08:00';
        const horarioFe = e.horario_fechamento || '18:00';

        // Calcula se está aberto agora (simples, baseado só no horário)
        const agora = hoje.getHours() * 60 + hoje.getMinutes();
        const [hAb, mAb] = horarioAb.split(':').map(Number);
        const [hFe, mFe] = horarioFe.split(':').map(Number);
        const abertoAgora = agora >= hAb * 60 + mAb && agora < hFe * 60 + mFe;

        const chavePix = e.chave_pix || CONFIG.CHAVE_PIX_PADRAO;

        return `
        <div class="card card-gold fade-in" style="animation-delay:${idx * 0.06}s">
          <div class="est-card">
            <div style="width:50px;height:50px;border-radius:10px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;border:1px solid rgba(201,168,76,0.15);">💈</div>
            <div class="est-info">
              <div class="est-nome">${e.nome}</div>
              <div class="est-resp">${e.responsavel}</div>
              <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;align-items:center;">
                ${e.status === 'ativo'
                  ? '<span class="badge badge-green">Ativo</span>'
                  : '<span class="badge badge-grey">Inativo</span>'}
                ${abertoAgora
                  ? '<span class="badge badge-green" style="font-size:0.62rem;">Aberto agora</span>'
                  : '<span class="badge badge-grey" style="font-size:0.62rem;">Fechado agora</span>'}
              </div>
            </div>
          </div>

          <!-- Detalhes do estabelecimento -->
          <div class="est-details">
            <div class="est-detail-row">
              <span class="icon">📱</span>
              <strong>${e.telefone}</strong>
              ${e.email ? `<span style="color:var(--text3)">·</span> <span>${e.email}</span>` : ''}
            </div>
            <div class="est-detail-row">
              <span class="icon">🕐</span>
              <strong>${horarioAb} – ${horarioFe}</strong>
              <span style="font-size:0.72rem;color:var(--text3);">hoje: ${diaAtual}</span>
            </div>
            ${e.endereco ? `
            <div class="est-detail-row">
              <span class="icon">📍</span>
              <span>${e.endereco}</span>
            </div>` : ''}
            <div class="est-detail-row">
              <span class="icon">💠</span>
              <span>Pix: <strong>${chavePix}</strong></span>
            </div>
            ${e.data_cadastro ? `
            <div class="est-detail-row">
              <span class="icon">📅</span>
              <span>Cadastrado em <strong>${formatarData(String(e.data_cadastro).substring(0,10))}</strong></span>
            </div>` : ''}
          </div>

          <!-- Mini stats (se disponíveis na API) -->
          ${(e.total_agendamentos !== undefined || e.agendamentos_hoje !== undefined) ? `
          <div class="est-stats">
            ${e.agendamentos_hoje !== undefined ? `
            <div class="est-stat">
              <div class="est-stat-val">${e.agendamentos_hoje}</div>
              <div class="est-stat-lbl">Hoje</div>
            </div>` : ''}
            ${e.total_agendamentos !== undefined ? `
            <div class="est-stat">
              <div class="est-stat-val">${e.total_agendamentos}</div>
              <div class="est-stat-lbl">Total</div>
            </div>` : ''}
            ${e.receita_mes !== undefined ? `
            <div class="est-stat">
              <div class="est-stat-val" style="font-size:0.85rem;">${formatarMoeda(e.receita_mes)}</div>
              <div class="est-stat-lbl">Este mês</div>
            </div>` : ''}
          </div>` : ''}

          <!-- Links -->
          <div class="est-links">
            <div class="link-box" onclick="copiar('${e.link_dashboard}', 'Link do painel copiado!')">
              <div style="flex:1;min-width:0;">
                <span class="link-label">Painel do Responsável</span>
                <span class="link-url">${e.link_dashboard}</span>
              </div>
              <button class="copy-btn">📋</button>
            </div>
            <div class="link-box" onclick="copiar('${e.link_booking}', 'Link de agendamento copiado!')">
              <div style="flex:1;min-width:0;">
                <span class="link-label">Link de Agendamento</span>
                <span class="link-url">${e.link_booking}</span>
              </div>
              <button class="copy-btn">📋</button>
            </div>
          </div>

          <!-- Ações -->
          <div class="est-actions">
            <button class="btn btn-ghost btn-sm" onclick="compartilhar('${e.link_booking}', '${e.nome}')">
              🔗 Compartilhar
            </button>
            <button class="btn btn-ghost btn-sm" onclick="abrirPainel('${e.link_dashboard}')">
              📊 Painel
            </button>
            <button class="btn btn-danger btn-sm" onclick="deletarEst('${e.id}')">✕ Excluir</button>
          </div>
        </div>`;
      }).join('');
    }

    // ── COPIAR ─────────────────────────────────────────────
    function copiar(texto, msg) {
      navigator.clipboard.writeText(texto).then(() => mostrarToast(msg, 'sucesso'));
    }

    // ── COMPARTILHAR ───────────────────────────────────────
    function compartilhar(url, nome) {
      if (navigator.share) {
        navigator.share({ title: 'Agende no ' + nome, url });
      } else {
        copiar(url, 'Link copiado!');
      }
    }

    // ── ABRIR PAINEL ────────────────────────────────────────
    function abrirPainel(url) {
      window.open(url, '_blank');
    }

    // ── MODAL ──────────────────────────────────────────────
    document.getElementById('btn-novo').onclick = () => {
      document.getElementById('modal-novo').classList.add('open');
    };
    document.getElementById('btn-cancelar-modal').onclick = () => {
      document.getElementById('modal-novo').classList.remove('open');
    };
    document.getElementById('modal-novo').addEventListener('click', e => {
      if (e.target === document.getElementById('modal-novo'))
        document.getElementById('modal-novo').classList.remove('open');
    });

    // ── SALVAR ─────────────────────────────────────────────
    document.getElementById('btn-salvar-est').onclick = async () => {
      const nome = document.getElementById('f-nome').value.trim();
      const resp = document.getElementById('f-resp').value.trim();
      const tel  = document.getElementById('f-tel').value.trim();
      if (!nome || !resp || !tel) { mostrarToast('Preencha os campos obrigatórios', 'erro'); return; }

      mostrarLoading(true);
      const res = await api({
        action: 'salvarEstabelecimento',
        nome, responsavel: resp, telefone: tel,
        email: document.getElementById('f-email').value.trim(),
        endereco: document.getElementById('f-end').value.trim(),
        horario_abertura: document.getElementById('f-abre').value,
        horario_fechamento: document.getElementById('f-fecha').value,
        chave_pix: document.getElementById('f-pix').value.trim() || CONFIG.CHAVE_PIX_PADRAO,
      });
      mostrarLoading(false);

      if (res.sucesso) {
        mostrarToast('Salão cadastrado com sucesso!', 'sucesso');
        document.getElementById('modal-novo').classList.remove('open');
        ['f-nome','f-resp','f-tel','f-email','f-end','f-pix'].forEach(id => document.getElementById(id).value = '');
        carregarEstabelecimentos();
      } else {
        mostrarToast(res.erro || 'Erro ao salvar', 'erro');
      }
    };

    // ── DELETAR ────────────────────────────────────────────
    async function deletarEst(id) {
      if (!confirm('Tem certeza que deseja excluir este salão?')) return;
      mostrarLoading(true);
      await api({ action: 'deletarEstabelecimento', id });
      mostrarLoading(false);
      mostrarToast('Salão removido', 'sucesso');
      carregarEstabelecimentos();
    }

    carregarEstabelecimentos();
  </script>
</body>
</html>
