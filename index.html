<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#080808">
  <title>CortaJá — Admin</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <style>
    .est-card { display:flex; gap:14px; align-items:flex-start; }
    .est-info { flex:1; min-width:0; }
    .est-nome { font-family:var(--font-title); font-weight:700; font-size:1rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .est-resp { font-size:0.82rem; color:var(--text2); margin-top:2px; }
    .est-links { display:flex; flex-direction:column; gap:6px; margin-top:14px; }
    .link-box { background:var(--bg3); border-radius:var(--radius-sm); padding:10px 14px; display:flex; align-items:center; gap:10px; cursor:pointer; border:1px solid rgba(255,255,255,0.06); }
    .link-label { font-size:0.72rem; color:var(--text3); text-transform:uppercase; letter-spacing:0.08em; display:block; margin-bottom:2px; }
    .link-url { font-size:0.8rem; color:var(--gold); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; }
    .copy-btn { color:var(--text2); flex-shrink:0; background:none; border:none; cursor:pointer; font-size:0.85rem; }
    .est-actions { display:flex; gap:8px; margin-top:14px; }
  </style>
</head>
<body>
  <div id="loading-overlay"><div class="spinner"></div></div>

  <!-- PWA Banner -->
  <div id="pwa-banner">
    <div class="pwa-icon">✂️</div>
    <div class="pwa-text">
      <h4>Instalar CortaJá</h4>
      <p>Acesse mais rápido pela tela inicial</p>
    </div>
    <div class="pwa-actions">
      <button class="btn btn-primary btn-sm" id="pwa-install-btn">Instalar</button>
      <button class="btn btn-ghost btn-sm" id="pwa-dismiss-btn">Depois</button>
    </div>
  </div>

  <div class="page">
    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <div class="logo">Corta<span>Já</span></div>
        <span class="badge badge-gold">Admin</span>
      </div>
    </header>

    <!-- Stats -->
    <div class="section" id="stats-section">
      <div class="grid-2">
        <div class="stat-card fade-in">
          <div class="stat-value" id="stat-total">–</div>
          <div class="stat-label">Salões</div>
        </div>
        <div class="stat-card fade-in" style="animation-delay:.08s">
          <div class="stat-value" id="stat-ativos">–</div>
          <div class="stat-label">Ativos</div>
        </div>
      </div>
    </div>

    <!-- Lista de estabelecimentos -->
    <div class="section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div class="section-title" style="margin:0">Estabelecimentos</div>
        <button class="btn btn-primary btn-sm" id="btn-novo">+ Novo</button>
      </div>
      <div class="stack" id="lista-est">
        <div class="empty"><div class="empty-icon">💈</div><p>Nenhum salão cadastrado ainda</p></div>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-item active">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      Início
    </button>
    <button class="nav-item" id="nav-relatorios">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Relatórios
    </button>
    <button class="nav-item" id="nav-config">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Config
    </button>
  </nav>

  <!-- Modal: Novo Estabelecimento -->
  <div class="modal-overlay" id="modal-novo">
    <div class="modal">
      <div class="modal-handle"></div>
      <h3 class="modal-title">Novo Estabelecimento</h3>
      <div class="stack">
        <div class="input-group">
          <label class="input-label">Nome do Salão *</label>
          <input class="input" id="f-nome" placeholder="Ex: Barbearia Elite" type="text">
        </div>
        <div class="input-group">
          <label class="input-label">Responsável *</label>
          <input class="input" id="f-resp" placeholder="Nome completo" type="text">
        </div>
        <div class="input-group">
          <label class="input-label">Telefone *</label>
          <input class="input" id="f-tel" placeholder="(61) 99999-9999" type="tel">
        </div>
        <div class="input-group">
          <label class="input-label">E-mail</label>
          <input class="input" id="f-email" placeholder="email@exemplo.com" type="email">
        </div>
        <div class="grid-2">
          <div class="input-group">
            <label class="input-label">Abre</label>
            <input class="input" id="f-abre" type="time" value="08:00">
          </div>
          <div class="input-group">
            <label class="input-label">Fecha</label>
            <input class="input" id="f-fecha" type="time" value="18:00">
          </div>
        </div>
        <div class="input-group">
          <label class="input-label">Chave Pix</label>
          <input class="input" id="f-pix" placeholder="Telefone, CPF ou e-mail" type="text">
        </div>
        <div style="display:flex;gap:10px;margin-top:8px;">
          <button class="btn btn-ghost btn-full" id="btn-cancelar-modal">Cancelar</button>
          <button class="btn btn-primary btn-full" id="btn-salvar-est">Salvar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    // ── PWA ────────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }

    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('pwa-banner').classList.add('show');
    });
    document.getElementById('pwa-install-btn').onclick = async () => {
      if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; }
      document.getElementById('pwa-banner').classList.remove('show');
    };
    document.getElementById('pwa-dismiss-btn').onclick = () => {
      document.getElementById('pwa-banner').classList.remove('show');
    };

    // ── CARREGAR LISTA ─────────────────────────────────────
    async function carregarEstabelecimentos() {
      mostrarLoading(true);
      const lista = await api({ action: 'listarEstabelecimentos' });
      mostrarLoading(false);

      const ativos = Array.isArray(lista) ? lista.filter(e => e.status === 'ativo') : [];
      document.getElementById('stat-total').textContent = Array.isArray(lista) ? lista.length : 0;
      document.getElementById('stat-ativos').textContent = ativos.length;

      const container = document.getElementById('lista-est');
      if (!Array.isArray(lista) || lista.length === 0) {
        container.innerHTML = '<div class="empty"><div class="empty-icon">💈</div><p>Nenhum salão cadastrado ainda</p></div>';
        return;
      }

      container.innerHTML = lista.map(e => `
        <div class="card card-gold fade-in">
          <div class="est-card">
            <div style="width:48px;height:48px;border-radius:16px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;">💈</div>
            <div class="est-info">
              <div class="est-nome">${e.nome}</div>
              <div class="est-resp">${e.responsavel} · ${e.telefone}</div>
              <div style="margin-top:8px;">${e.status === 'ativo' ? '<span class="badge badge-green">Ativo</span>' : '<span class="badge badge-grey">Inativo</span>'}</div>
            </div>
          </div>
          <div class="est-links">
            <div class="link-box" onclick="copiar('${e.link_dashboard}', 'Link do painel copiado!')">
              <div style="flex:1;min-width:0;">
                <span class="link-label">Painel do Responsável</span>
                <span class="link-url">${e.link_dashboard}</span>
              </div>
              <button class="copy-btn">📋</button>
            </div>
            <div class="link-box" onclick="copiar('${e.link_booking}', 'Link de agendamento copiado!')">
              <div style="flex:1;min-width:0;">
                <span class="link-label">Link de Agendamento</span>
                <span class="link-url">${e.link_booking}</span>
              </div>
              <button class="copy-btn">📋</button>
            </div>
          </div>
          <div class="est-actions">
            <button class="btn btn-ghost btn-sm" onclick="compartilhar('${e.link_booking}', '${e.nome}')">Compartilhar</button>
            <button class="btn btn-danger btn-sm" onclick="deletarEst('${e.id}')">Excluir</button>
          </div>
        </div>
      `).join('');
    }

    // ── COPIAR ─────────────────────────────────────────────
    function copiar(texto, msg) {
      navigator.clipboard.writeText(texto).then(() => mostrarToast(msg, 'sucesso'));
    }

    // ── COMPARTILHAR ───────────────────────────────────────
    function compartilhar(url, nome) {
      if (navigator.share) {
        navigator.share({ title: 'Agende no ' + nome, url });
      } else {
        copiar(url, 'Link copiado!');
      }
    }

    // ── MODAL ──────────────────────────────────────────────
    document.getElementById('btn-novo').onclick = () => {
      document.getElementById('modal-novo').classList.add('open');
    };
    document.getElementById('btn-cancelar-modal').onclick = () => {
      document.getElementById('modal-novo').classList.remove('open');
    };
    document.getElementById('modal-novo').addEventListener('click', e => {
      if (e.target === document.getElementById('modal-novo'))
        document.getElementById('modal-novo').classList.remove('open');
    });

    // ── SALVAR ─────────────────────────────────────────────
    document.getElementById('btn-salvar-est').onclick = async () => {
      const nome = document.getElementById('f-nome').value.trim();
      const resp = document.getElementById('f-resp').value.trim();
      const tel  = document.getElementById('f-tel').value.trim();
      if (!nome || !resp || !tel) { mostrarToast('Preencha os campos obrigatórios', 'erro'); return; }

      mostrarLoading(true);
      const res = await api({
        action: 'salvarEstabelecimento',
        nome, responsavel: resp, telefone: tel,
        email: document.getElementById('f-email').value.trim(),
        horario_abertura: document.getElementById('f-abre').value,
        horario_fechamento: document.getElementById('f-fecha').value,
        chave_pix: document.getElementById('f-pix').value.trim() || CONFIG.CHAVE_PIX_PADRAO,
      });
      mostrarLoading(false);

      if (res.sucesso) {
        mostrarToast('Salão cadastrado com sucesso!', 'sucesso');
        document.getElementById('modal-novo').classList.remove('open');
        ['f-nome','f-resp','f-tel','f-email','f-pix'].forEach(id => document.getElementById(id).value = '');
        carregarEstabelecimentos();
      } else {
        mostrarToast(res.erro || 'Erro ao salvar', 'erro');
      }
    };

    // ── DELETAR ────────────────────────────────────────────
    async function deletarEst(id) {
      if (!confirm('Tem certeza que deseja excluir este salão?')) return;
      mostrarLoading(true);
      await api({ action: 'deletarEstabelecimento', id });
      mostrarLoading(false);
      mostrarToast('Salão removido', 'sucesso');
      carregarEstabelecimentos();
    }

    carregarEstabelecimentos();
  </script>
</body>
</html>
